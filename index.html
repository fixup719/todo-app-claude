<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo & Pomodoro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-mode="work">

    <!-- в”Җв”Җ лЎңк·ёмқё нҷ”л©ҙ в”Җв”Җ -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1 class="auth-title">Todo &amp; Pomodoro</h1>
            <p class="auth-subtitle">к°ңмқё мғқмӮ°м„ұ м•ұ</p>
            <button id="githubLoginBtn" class="github-login-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                GitHubлЎң лЎңк·ёмқё
            </button>
        </div>
    </div>

    <!-- в”Җв”Җ м•ұ ліёмІҙ (лЎңк·ёмқё нӣ„ н‘ңмӢң) в”Җв”Җ -->
    <div id="appContent" class="app-wrapper" style="display:none">
        <div class="header-row">
            <h1 class="app-title">Todo &amp; Pomodoro</h1>
            <div class="header-actions">
                <div id="userInfo" class="user-info"></div>
                <button id="themeToggle" class="theme-toggle" aria-label="лӢӨнҒ¬/лқјмқҙнҠё лӘЁл“ң м „нҷҳ">рҹҢҷ</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- Left: Todo Section -->
            <section class="todo-section">
                <h2>н•  мқј лӘ©лЎқ</h2>

                <div class="todo-input-wrap">
                    <input
                        type="text"
                        id="todoInput"
                        placeholder="н•  мқјмқ„ мһ…л Ҙн•ҳкі  Enter лҳҗлҠ” м¶”к°Җ лІ„нҠјмқ„ лҲ„лҘҙм„ёмҡ”"
                        maxlength="100"
                        autocomplete="off"
                    >
                    <button id="addBtn">м¶”к°Җ</button>
                </div>

                <div class="add-options">
                    <select id="prioritySelect" data-priority="normal">
                        <option value="high">лҶ’мқҢ</option>
                        <option value="normal" selected>ліҙнҶө</option>
                        <option value="low">лӮ®мқҢ</option>
                    </select>
                    <!-- #addColorPicker injected by JS -->
                </div>

                <div class="filter-bar">
                    <span class="filter-label">мҡ°м„ мҲңмң„</span>
                    <select id="priorityFilter">
                        <option value="all">м „мІҙ</option>
                        <option value="high">лҶ’мқҢ</option>
                        <option value="normal">ліҙнҶө</option>
                        <option value="low">лӮ®мқҢ</option>
                    </select>
                </div>

                <ul class="todo-list" id="todoList"></ul>

                <div class="todo-footer" id="todoFooter" style="display:none;">
                    <span id="todoCount"></span>
                    <button id="clearCompletedBtn">мҷ„лЈҢ н•ӯлӘ© мӮӯм ң</button>
                </div>
            </section>

            <!-- Right column -->
            <div class="right-column">
                <!-- Top right: Pomodoro (compact) -->
                <section class="pomodoro-section">
                    <div class="pomodoro-modes">
                        <button class="mode-btn active" data-mode="work">м§‘мӨ‘ 25л¶„</button>
                        <button class="mode-btn" data-mode="short">м§§мқҖ нңҙмӢқ 5л¶„</button>
                        <button class="mode-btn" data-mode="long">кёҙ нңҙмӢқ 15л¶„</button>
                    </div>

                    <div class="timer-display">
                        <div class="timer-ring">
                            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                                <circle class="ring-bg" cx="100" cy="100" r="88"/>
                                <circle class="ring-progress" id="progressRing" cx="100" cy="100" r="88"/>
                            </svg>
                            <div class="timer-time" id="timerDisplay">25:00</div>
                        </div>
                    </div>

                    <div class="timer-controls">
                        <button class="ctrl-btn" id="startBtn">мӢңмһ‘</button>
                        <button class="ctrl-btn secondary" id="resetBtn">мҙҲкё°нҷ”</button>
                    </div>
                </section>

                <!-- Bottom right: 10-Min Planner -->
                <section class="planner-section">
                    <div class="planner-header">
                        <h2>10л¶„ н”Ңлһҳл„Ҳ</h2>
                        <div class="hour-nav">
                            <button id="prevHour" aria-label="мқҙм „ мӢңк°„">&#9664;</button>
                            <span id="currentHourLabel">00:00 ~ 00:50</span>
                            <button id="nextHour" aria-label="лӢӨмқҢ мӢңк°„">&#9654;</button>
                        </div>
                    </div>
                    <p class="planner-hint">н•  мқј н•ӯлӘ©мқ„ л“ңлһҳк·ён•ҙм„ң мӢңк°„ м№ём—җ лҶ“мңјм„ёмҡ”</p>
                    <div class="planner-slots" id="plannerSlots"></div>
                </section>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
